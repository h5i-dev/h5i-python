[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
command = "h5i hook wrap-bash"
type = "command"

[[hooks.SessionStart]]

[[hooks.SessionStart.hooks]]
command = "h5i hook session-start"
type = "command"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
command = "h5i hook codex finish --quiet"
type = "command"
