name: Python

on:
  push:
    branches: ["main"]
  pull_request:
    # Run on PRs against any base branch so feature branches get checked.

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ examples/

  unit:
    name: unit (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .[dev]
      # The integration module auto-skips here (no h5i binary on the runner);
      # the dedicated `integration` job builds one and runs it for real.
      - run: pytest -q

  package:
    name: sdist + wheel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Wheel installs and imports
        run: |
          pip install dist/*.whl
          python -c "import h5i.orchestra as o; print(o.__version__)"

  # Build the Rust engine from the sibling h5i repo and run the cross-process
  # integration suite against the real `h5i orchestra serve` binary. The
  # engine ref mirrors this PR's branch name when one exists over there
  # (py-sdk here pairs with py-sdk there), falling back to main.
  integration:
    name: integration (real h5i binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out the h5i engine (branch-matched, fallback main)
        uses: actions/checkout@v4
        with:
          repository: h5i-dev/h5i
          path: h5i-engine
      - name: Switch engine to the matching branch if it exists
        working-directory: h5i-engine
        run: |
          branch="${{ github.head_ref || github.ref_name }}"
          if git ls-remote --exit-code origin "refs/heads/$branch" >/dev/null 2>&1; then
            git fetch origin "$branch"
            git checkout FETCH_HEAD
            echo "engine ref: $branch ($(git rev-parse --short HEAD))"
          else
            echo "engine ref: default ($(git rev-parse --short HEAD))"
          fi

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: h5i-engine

      - name: Build the engine
        working-directory: h5i-engine
        env:
          # The CLI is all the integration suite needs; skip web asset builds.
          H5I_SKIP_WEB_BUILD: "1"
        run: cargo build --locked

      - name: Set Git user
        # Env/team operations commit through libgit2 and need an identity.
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]

      - name: Run integration suite
        env:
          H5I: ${{ github.workspace }}/h5i-engine/target/debug/h5i
        run: |
          if ! "$H5I" orchestra --help >/dev/null 2>&1; then
            echo "::warning::engine ref lacks 'h5i orchestra serve' — integration skipped (merge the bridge to the engine's default branch to activate this job)"
            exit 0
          fi
          pytest tests/test_integration.py -v -rs
